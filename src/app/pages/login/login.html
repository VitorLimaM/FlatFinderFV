<div class="login-container">
  <h2>Oi, bem-vindo! 👋</h2>

  <div class="input-group">
    <input type="email" placeholder="Seu email" [(ngModel)]="email">
  </div>

  <div class="input-group">
    <input type="password" placeholder="Senha secreta" [(ngModel)]="password">
  </div>

  <button (click)="login()">ENTRAR AGORA! 🚀</button>

  <div class="register-link">
    Ainda não tem conta? 
    <a routerLink="/register">Cadastrar</a>
  </div>
</div>
