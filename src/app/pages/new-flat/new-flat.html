<app-header></app-header>

<h2 class="page-title">New Flat</h2>

<form class="flat-form" [formGroup]="flatForm" (ngSubmit)="onSave()">

  <div class="form-group">
    <label class="form-label">City <span class="required">*</span></label>
    <input type="text" class="form-input" formControlName="city">
    <p *ngIf="isInvalid('city')" class="error-msg">City must have at least 2 characters</p>
  </div>

  <div class="form-group">
    <label class="form-label">Street Name <span class="required">*</span></label>
    <input type="text" class="form-input" formControlName="streetName">
    <p *ngIf="isInvalid('streetName')" class="error-msg">Street name is required</p>
  </div>

  <div class="form-group">
    <label class="form-label">Street Number <span class="required">*</span></label>
    <input type="number" class="form-input" formControlName="streetNumber">
    <p *ngIf="isInvalid('streetNumber')" class="error-msg">Must be greater than 0</p>
  </div>

  <div class="form-group">
    <label class="form-label">Area Size (m²) <span class="required">*</span></label>
    <input type="number" class="form-input" formControlName="areaSize">
    <p *ngIf="isInvalid('areaSize')" class="error-msg">Minimum is 10m²</p>
  </div>

  <div class="form-group">
    <label class="form-label">Year Built <span class="required">*</span></label>
    <input type="number" class="form-input" formControlName="yearBuilt">
    <p *ngIf="isInvalid('yearBuilt')" class="error-msg">Between 1900 and 2026</p>
  </div>

  <div class="form-group">
    <label class="form-label">Rent Price ($) <span class="required">*</span></label>
    <input type="number" class="form-input" formControlName="rentPrice">
    <p *ngIf="isInvalid('rentPrice')" class="error-msg">Minimum is $100</p>
  </div>

  <div class="form-group">
    <label class="form-label">Date Available <span class="required">*</span></label>
    <input type="date" class="form-input" formControlName="dateAvailable">
    <p *ngIf="isInvalid('dateAvailable')" class="error-msg">Date is required</p>
  </div>

  <div class="checkbox-group">
    <input type="checkbox" class="form-checkbox" formControlName="hasAC">
    <label class="checkbox-label">Has Air Conditioning</label>
  </div>

  <button type="submit" class="submit-btn">
    Save Flat
  </button>

  <p *ngIf="formError" class="error-msg general-error">
    Please fix the errors above ❌
  </p>

</form>
