<app-header></app-header>

<div class="page">
  <div class="form-wrapper">

    <div class="form-card">
      <div class="form-header">
        <h3>Edit Flat</h3>
      </div>

      <div class="form-body">
        <form [formGroup]="editForm" (ngSubmit)="onSubmit()">

          <div class="form-grid">
            
            <div class="form-group">
              <label>City <span>*</span></label>
              <input type="text" formControlName="city">
            </div>

            <div class="form-group">
              <label>Street Name <span>*</span></label>
              <input type="text" formControlName="streetName">
            </div>

            <div class="form-group">
              <label>Street Number <span>*</span></label>
              <input type="number" formControlName="streetNumber">
            </div>

            <div class="form-group">
              <label>Area Size (m²) <span>*</span></label>
              <input type="number" formControlName="areaSize">
            </div>

            <div class="form-group">
              <label>Has Air Conditioning</label>
              <div class="checkbox">
                <input type="checkbox" formControlName="hasAC" id="hasAC">
                <label for="hasAC">Yes</label>
              </div>
            </div>

            <div class="form-group">
              <label>Year Built <span>*</span></label>
              <input type="number" formControlName="yearBuilt">
            </div>

            <div class="form-group">
              <label>Rent Price (per month) <span>*</span></label>
              <input type="number" formControlName="rentPrice">
            </div>

            <div class="form-group">
              <label>Date Available <span>*</span></label>
              <input type="date" formControlName="dateAvailable">
            </div>

          </div>

          <div class="form-actions">
            <button type="submit" 
                    class="btn-primary"
                    [disabled]="editForm.invalid">
               Update Flat
            </button>

            <button type="button" 
                    class="btn-secondary"
                    (click)="navigateToHome()">
              Cancel
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
